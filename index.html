:root {

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
.header{background:linear-gradient(135deg,#ede7ff,#f7f4fc);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header-inner{max-width:540px;margin:0 auto;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);background:var(--purple-light);padding:3px 8px;border-radius:20px;margin-bottom:5px;display:inline-block;}
.header-title{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.5px;}
.header-sub{display:flex;align-items:center;gap:8px;margin-top:3px;}
.header-date{font-size:12px;color:var(--text3);}
.sync{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:10px;}
.sync-ok{background:var(--green-bg);color:var(--green);}
.sync-ing{background:var(--yellow-bg);color:var(--yellow);}
.sync-err{background:var(--red-bg);color:var(--red);}
.protein-display{text-align:right;}
.protein-big{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;line-height:1;transition:color .4s;}
.protein-label{font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:2px;font-family:'DM Mono',monospace;}
.progress-bars{display:flex;flex-direction:column;gap:8px;}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:4px;}
.pleft{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.pright{font-family:'DM Mono',monospace;font-size:10px;}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.tabs{max-width:540px;margin:0 auto;display:flex;border-bottom:1px solid var(--border);padding:0 16px;margin-top:4px;}
.tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);cursor:pointer;transition:all .2s;margin-bottom:-1px;}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.main{max-width:540px;margin:0 auto;padding:16px 16px 100px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;margin-bottom:10px;}
.input-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;margin-bottom:8px;display:block;}
.input-wrap{position:relative;margin-bottom:6px;}
textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px 40px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;transition:border-color .2s;}
textarea:focus{border-color:var(--purple-mid);}
textarea::placeholder{color:var(--text3);}
.log-btn{position:absolute;bottom:10px;right:10px;background:var(--purple);border:none;border-radius:6px;padding:6px 16px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(124,77,255,.3);}
.log-btn:disabled{background:var(--border2);color:var(--text3);box-shadow:none;cursor:not-allowed;}
.input-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-text{font-size:14px;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);position:relative;}
.meal-card.unrecognized{border-color:#ffe0b2;background:#fffbf5;}
.meal-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center;}
.meal-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple);background:var(--purple-light);padding:2px 7px;border-radius:10px;}
.meal-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.meal-edit-badge{font-family:'DM Mono',monospace;font-size:10px;color:#e65100;background:#fff3e0;padding:2px 7px;border-radius:10px;}
.meal-desc{font-size:14px;color:var(--text);line-height:1.45;margin-bottom:8px;padding-right:24px;}
.meal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.meal-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:10px;border:1px solid var(--border);}
.meal-values{display:flex;gap:14px;align-items:center;}
.val-group{display:flex;align-items:center;gap:5px;}
.val-input{width:56px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-family:'DM Mono',monospace;font-size:17px;font-weight:500;text-align:center;outline:none;transition:border-color .2s;}
.val-input:focus{border-color:var(--purple-mid);}
.val-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}

.del-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:2px 4px;border-radius:4px;transition:all .15s;}

.totals-bar{background:var(--purple-light);border:1px solid var(--border2);border-radius:var(--r);padding:14px;display:flex;justify-content:space-between;margin-bottom:10px;}
.total-item{text-align:center;}
.total-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.total-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:2px;}

.water-big{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;line-height:1;transition:color .4s;}
.water-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:2px;margin-top:4px;}
.water-remain{font-size:13px;color:var(--text2);margin-top:6px;}

.water-fill{position:absolute;bottom:0;left:0;right:0;transition:height .5s ease;}

.wboz{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;}
.wblabel{font-size:11px;color:var(--text);margin-top:2px;}
.wbdesc{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);}

function todayISO() { var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function sbHeaders() {
  return { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' };
}

async function sbGet(date) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/zepbound_days?date=eq.' + date + '&select=*', { headers: sbHeaders() });
  if (!res.ok) throw new Error('GET ' + res.status);
  var rows = await res.json();
  return rows.length > 0 ? rows[0] : null;
}

async function sbUpsert(data) {
  var res = await fetch(SUPABASE_URL + '/rest/v1/zepbound_days?on_conflict=date', {
    method: 'POST',
    headers: Object.assign({}, sbHeaders(), { 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(data)
  });
  if (!res.ok) { var t = await res.text(); throw new Error('UPSERT ' + res.status + ': ' + t); }
}

async function sbHistory() {
  var res = await fetch(SUPABASE_URL + '/rest/v1/zepbound_days?select=*&order=date.desc&limit=30', { headers: sbHeaders() });

function estimateMeal(text) {
  var lower = text.toLowerCase();
  var matched = [];
  var usedGroups = {};
  var usedLabels = {};
  var blockedGroups = {};
  var sorted = FOODS.slice().sort(function(a,b) {
    return Math.max.apply(null, b.keys.map(function(k){return k.length;})) -
           Math.max.apply(null, a.keys.map(function(k){return k.length;}));
  });
  for (var i = 0; i < sorted.length; i++) {
    var food = sorted[i];
    for (var j = 0; j < food.keys.length; j++) {
      var key = food.keys[j];
      if (lower.indexOf(key) === -1) continue;
      if (usedLabels[food.label]) continue;
      if (food.group && usedGroups[food.group]) continue;
      if (food.group && blockedGroups[food.group]) continue;
      matched.push(food);
      usedLabels[food.label] = true;
      if (food.group) usedGroups[food.group] = true;
      if (food.blocks) { food.blocks.forEach(function(b){ blockedGroups[b] = true; }); }
      break;
    }
  }
  var tp = 0, tc = 0;
  matched.forEach(function(food) {
    var mult = 1;
    var idx = lower.indexOf(food.keys[0]);
    var ctx = lower.slice(Math.max(0,idx-25), idx+25);
    if (/\btwo\b|2x/.test(ctx)) mult = 2;
    else if (/\bhalf\b/.test(ctx)) mult = 0.5;
    else if (/\bthree\b|3x/.test(ctx)) mult = 3;
    tp += Math.round(food.p * mult);
    tc += Math.round(food.c * mult);
  });
  var note = matched.length === 0 ? 'Food not in database - tap the protein number to edit manually.'
    : tp >= 40 ? tp + 'g protein is a strong meal - exactly the Zepbound approach.'
    : tp >= 25 ? tp + 'g protein is solid. Protein-first is working.'
    : tp >= 15 ? tp + 'g here - aim to make up the gap at your next meal.'
    : 'Light protein here. Prioritize protein at your next meal or add a snack.';
  return { protein: tp, calories: tc, items: matched.length > 0 ? matched.map(function(f){return f.label;}) : [text], notes: note, recognized: matched.length > 0 };
}

function pColor(pct) { return pct >= 80 ? '#43a047' : pct >= 50 ? '#f9a825' : '#e53935'; }
function wColor(pct) { return pct >= 80 ? '#1e88e5' : pct >= 50 ? '#42a5f5' : '#e53935'; }

var state = {
  meals:[], waterOz:0, dayNote:'', activeTab:'log',
  history:[], loading:true, saveStatus:null, dbError:null,
  feedback:null, feedbackLoading:false, input:'',
  saveTimer:null, ready:false
};

function setState(updates) { Object.assign(state, updates); render(); }

function scheduleSave() {
  if (!state.ready) return;
  if (state.saveTimer) clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(doSave, 1000);
}

async function doSave() {
  setState({ saveStatus:'saving' });
  try {
    var tp = state.meals.reduce(function(s,m){return s+m.protein;},0);
    var tc = state.meals.reduce(function(s,m){return s+m.calories;},0);
    await sbUpsert({ date:todayISO(), meals:state.meals, water_oz:state.waterOz, day_note:state.dayNote, total_protein:tp, total_calories:tc, updated_at:new Date().toISOString() });
    var hist = await sbHistory();
    setState({ saveStatus:'saved', history:hist||[] });
    setTimeout(function(){ setState({ saveStatus:null }); }, 2000);
  } catch(e) {
    setState({ saveStatus:'error', dbError:'Save failed: ' + e.message });
  }
}

async function init() {
  try {
    var results = await Promise.all([sbGet(todayISO()), sbHistory()]);
    var row = results[0], hist = results[1];
    if (row) {
      state.meals = row.meals || [];
      state.waterOz = row.water_oz || 0;
      state.dayNote = row.day_note || '';
    }
    state.history = hist||[];
  } catch(e) {
    state.dbError = 'Could not load data: ' + e.message;
  }
  state.loading = false;
  state.ready = true;
  render();
}

function logMeal() {
  var txt = state.input.trim();
  if (!txt) return;
  var est = estimateMeal(txt);
  state.meals = state.meals.concat([{
    id: Date.now(), description: txt, items: est.items,
    protein: est.protein, calories: est.calories, notes: est.notes,
    recognized: est.recognized,
    time: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})
  }]);
  state.input = '';
  state.feedback = null;
  scheduleSave();
  render();
  setTimeout(function(){ var ta=document.getElementById('meal-input'); if(ta) ta.focus(); }, 50);
}

function deleteMeal(id) {
  state.meals = state.meals.filter(function(m){return m.id!==id;});
  state.feedback = null;
  scheduleSave(); render();
}

function updateMealVal(id, field, val) {
  state.meals = state.meals.map(function(m){ return m.id===id ? Object.assign({},m,JSON.parse('{"'+field+'":'+( parseInt(val)||0)+'}')) : m; });
  scheduleSave(); render();
}

function addWater(oz) { state.waterOz = Math.min(state.waterOz+oz,120); scheduleSave(); render(); }

function generateFeedback() {
  setState({ feedbackLoading:true });
  setTimeout(function() {
    var tp=state.meals.reduce(function(s,m){return s+m.protein;},0);
    var tw=state.waterOz;
    var pp=(tp/PROTEIN_GOAL)*100, wp=(tw/WATER_GOAL)*100;
    var fb = pp>=95 ? 'Outstanding - '+tp+'g protein hits the goal. '
      : pp>=75 ? 'Good day at '+tp+'g protein, '+(PROTEIN_GOAL-tp)+'g short of goal. '
      : pp>=50 ? tp+'g protein is a start - push harder at remaining meals. '
      : 'Only '+tp+'g protein - lean on Greek yogurt, cottage cheese, or a Fairlife shake. ';
    fb += wp>=90 ? 'Hydration excellent at '+tw+'oz. '
      : wp>=60 ? 'Water at '+tw+'oz - keep sipping toward '+WATER_GOAL+'oz. '
      : 'Water low at '+tw+'oz - dehydration worsens Zepbound side effects. ';
    fb += state.meals.length>=3 ? state.meals.length+' meals shows solid eating structure.'
      : state.meals.length===2 ? 'Only 2 meals - consider a snack if your appetite allows.'
      : 'Light logging today - make sure you are eating enough even when not hungry.';
    if (state.dayNote) fb += ' Note: "'+state.dayNote+'"';
    setState({ feedback:fb, feedbackLoading:false });
  }, 400);
}

  var tp=state.meals.reduce(function(s,m){return s+m.protein;},0);
  var tc=state.meals.reduce(function(s,m){return s+m.calories;},0);
  var date=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var mealLines=state.meals.map(function(m,i){
    return '  Meal '+(i+1)+' ('+m.time+'): '+m.description+' - '+m.protein+'g protein, '+m.calories+' cal';
  }).join('\n');
  var msg='Here is my Zepbound daily summary for '+date+':\n\n'
    +'MEALS LOGGED ('+state.meals.length+'):\n'+(mealLines||'  No meals logged')+'\n\n'
    +'TOTALS:\n  Protein: '+tp+'g / 140g goal\n  Calories: '+tc+'\n  Water: '+state.waterOz+'oz / 80oz goal\n'
    +(state.dayNote ? '\nDAY NOTES: '+state.dayNote+'\n' : '')
    +'\nPlease give me feedback on today, protein targets, and what to focus on tomorrow.';
  window.open('https://claude.ai/new?q='+encodeURIComponent(msg), '_blank');
}

    +'</div></div></div>'
    +'<div class="tabs">'
    +['log','water','summary','history'].map(function(t){return '<button class="tab'+(state.activeTab===t?' active':'')+'" onclick="setTab(\''+t+'\')">'+t+'</button>';}).join('')
    +'</div>'
    +'<div class="main">'+tabContent+'</div>';

  var ta=document.getElementById('meal-input');
  if (ta) {
    ta.value=state.input;
    ta.addEventListener('input',function(e){
      state.input=e.target.value;
      var btn=document.getElementById('log-btn');
      if(btn) btn.disabled=!e.target.value.trim();
    });
    var btn=document.getElementById('log-btn');
    if(btn) btn.disabled=!state.input.trim();
  }
}

window.handleKey=function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();logMeal();} };
window.setTab=function(t){ setState({activeTab:t}); };
window.delMeal=deleteMeal;
window.updMeal=updateMealVal;
window.addWater=addWater;
window.resetWater=function(){ state.waterOz=0; scheduleSave(); render(); };
window.updateNote=function(v){ state.dayNote=v; scheduleSave(); };
window.generateFeedback=generateFeedback;
window.clearErr=function(){ setState({dbError:null}); };
window.shareToClaude=shareToClaude;
window.logMeal=logMeal;
window.resetDay=function(){
  if(confirm('Reset today\'s log? This cannot be undone.')){
    state.meals=[]; state.waterOz=0; state.feedback=null; state.dayNote='';
    scheduleSave(); render();
  }
};

window.onerror=function(msg,src,line,col,err){
  document.getElementById('app').innerHTML='<div style="padding:20px;font-family:monospace;color:#c00;background:#fff0f0;margin:20px;border-radius:8px;border:1px solid #fcc"><b>Error</b><br>'+msg+'<br>Line: '+line+'</div>';
};

init();
</script>
</body>
</html>

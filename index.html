<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zepbound Tracker v1.6.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#f7f4fc;--surface:#fff;--surface2:#f0ebfa;--border:#e2d9f3;--border2:#cfc1eb;
  --purple:#7c4dff;--purple-light:#ede7ff;--purple-mid:#b39ddb;
  --text:#2d1f5e;--text2:#6b5b9a;--text3:#9e8ec4;
  --green:#43a047;--green-bg:#e8f5e9;--yellow:#f9a825;--yellow-bg:#fffde7;
  --red:#e53935;--red-bg:#ffebee;--blue:#1e88e5;--blue-bg:#e3f2fd;
  --r:14px;--rs:8px;--shadow:0 2px 12px rgba(124,77,255,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
.header{background:linear-gradient(135deg,#ede7ff,#f7f4fc);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.header-inner{max-width:540px;margin:0 auto;}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);background:var(--purple-light);padding:3px 8px;border-radius:20px;margin-bottom:5px;display:inline-block;}
.badge.dose-day{color:#fff;background:linear-gradient(90deg,#7c4dff,#b39ddb);animation:pulse-badge 2s infinite;}
@keyframes pulse-badge{0%,100%{box-shadow:0 0 0 0 rgba(124,77,255,.4);}50%{box-shadow:0 0 0 6px rgba(124,77,255,0);}}
.header-title{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.5px;}
.header-sub{display:flex;align-items:center;gap:8px;margin-top:3px;}
.header-date{font-size:12px;color:var(--text3);}
.sync{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:10px;}
.sync-ok{background:var(--green-bg);color:var(--green);}
.sync-ing{background:var(--yellow-bg);color:var(--yellow);}
.sync-err{background:var(--red-bg);color:var(--red);}
.protein-display{text-align:right;}
.protein-big{font-family:'DM Mono',monospace;font-size:32px;font-weight:500;line-height:1;transition:color .4s;}
.protein-label{font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:2px;font-family:'DM Mono',monospace;}
.progress-bars{display:flex;flex-direction:column;gap:8px;}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:4px;}
.pleft{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.pright{font-family:'DM Mono',monospace;font-size:10px;}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.tabs{max-width:540px;margin:0 auto;display:flex;border-bottom:1px solid var(--border);padding:0 16px;margin-top:4px;overflow-x:auto;}
.tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);cursor:pointer;transition:all .2s;margin-bottom:-1px;white-space:nowrap;min-width:52px;}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.main{max-width:540px;margin:0 auto;padding:16px 16px 100px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:10px;}
.card-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;margin-bottom:10px;}
.input-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;margin-bottom:8px;display:block;}
.input-wrap{position:relative;margin-bottom:6px;}
textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px 40px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;transition:border-color .2s;}
textarea:focus{border-color:var(--purple-mid);}
textarea::placeholder{color:var(--text3);}
.log-btn{position:absolute;bottom:10px;right:10px;background:var(--purple);border:none;border-radius:6px;padding:6px 16px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(124,77,255,.3);}
.log-btn:disabled{background:var(--border2);color:var(--text3);box-shadow:none;cursor:not-allowed;}
.input-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.empty{text-align:center;padding:48px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.empty-text{font-size:14px;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);}
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);position:relative;transition:all .2s;}
.meal-card.unrecognized{border-color:#ffe0b2;background:#fffbf5;}
.meal-card.merge-mode{cursor:pointer;padding-left:44px;}
.meal-card.merge-selected{border-color:var(--purple);background:var(--purple-light);box-shadow:0 0 0 2px rgba(124,77,255,.2);}
.merge-checkbox{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:20px;height:20px;border:2px solid var(--border2);border-radius:5px;background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.merge-checkbox.checked{background:var(--purple);border-color:var(--purple);}
.merge-checkbox.checked::after{content:'✓';color:#fff;font-size:12px;}
.meal-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center;}
.meal-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple);background:var(--purple-light);padding:2px 7px;border-radius:10px;}
.meal-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.meal-edit-badge{font-family:'DM Mono',monospace;font-size:10px;color:#e65100;background:#fff3e0;padding:2px 7px;border-radius:10px;}
.meal-desc{font-size:14px;color:var(--text);line-height:1.45;margin-bottom:8px;padding-right:24px;}
.meal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.meal-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);background:var(--surface2);padding:2px 8px;border-radius:10px;border:1px solid var(--border);}
.meal-values{display:flex;gap:14px;align-items:center;}
.val-group{display:flex;align-items:center;gap:5px;}
.val-input{width:56px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-family:'DM Mono',monospace;font-size:17px;font-weight:500;text-align:center;outline:none;transition:border-color .2s;}
.val-input:focus{border-color:var(--purple-mid);}
.val-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.meal-note{margin-top:8px;font-size:12px;color:var(--text2);font-style:italic;line-height:1.5;border-left:2px solid var(--border2);padding-left:10px;}
.del-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:2px 4px;border-radius:4px;transition:all .15s;}
.del-btn:hover{color:var(--red);background:var(--red-bg);}
.merge-bar{background:var(--purple-light);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.merge-bar-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--purple);}
.merge-bar-actions{display:flex;gap:8px;}
.merge-confirm{background:var(--purple);border:none;border-radius:6px;padding:6px 14px;color:#fff;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;}
.merge-confirm:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed;}
.merge-cancel{background:none;border:1px solid var(--border2);border-radius:6px;padding:6px 14px;color:var(--text2);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;}
.merge-trigger{background:none;border:1px solid var(--border2);border-radius:6px;padding:6px 12px;color:var(--text2);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s;margin-bottom:10px;}
.merge-trigger:hover{border-color:var(--purple);color:var(--purple);}
.totals-bar{background:var(--purple-light);border:1px solid var(--border2);border-radius:var(--r);padding:14px;display:flex;justify-content:space-between;margin-bottom:10px;}
.total-item{text-align:center;}
.total-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;}
.total-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:2px;}
.water-center{text-align:center;margin-bottom:22px;}
.water-big{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;line-height:1;transition:color .4s;}
.water-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:2px;margin-top:4px;}
.water-remain{font-size:13px;color:var(--text2);margin-top:6px;}
.water-bottle{width:72px;height:140px;margin:0 auto 22px;background:var(--surface2);border:2px solid var(--border2);border-radius:36px;position:relative;overflow:hidden;}
.water-fill{position:absolute;bottom:0;left:0;right:0;transition:height .5s ease;}
.water-pct{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text);z-index:1;}
.qadd-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:2px;text-align:center;margin-bottom:10px;}
.water-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.water-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 6px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);}
.water-btn:hover{background:var(--purple-light);border-color:var(--border2);}
.wboz{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;}
.wblabel{font-size:11px;color:var(--text);margin-top:2px;}
.wbdesc{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);}
.reset-btn{width:100%;background:none;border:1px solid var(--border);border-radius:var(--rs);padding:10px;color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .15s;margin-bottom:16px;}
.reset-btn:hover{border-color:var(--red);color:var(--red);}
.hyd-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.hyd-notes{font-size:13px;color:var(--text2);line-height:1.8;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--shadow);}
.stat-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;line-height:1;}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:4px;}
.breakdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;box-shadow:var(--shadow);}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.btime{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);width:52px;flex-shrink:0;}
.btrack{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.bfill{height:100%;border-radius:2px;transition:width .5s ease;}
.bval{font-family:'DM Mono',monospace;font-size:12px;width:34px;text-align:right;flex-shrink:0;}
.btotal{border-top:1px solid var(--border);margin-top:7px;padding-top:7px;display:flex;justify-content:space-between;}
.btotal-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.btotal-val{font-family:'DM Mono',monospace;font-size:12px;}
.notes-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;margin-bottom:7px;display:block;}
.feedback-btn{width:100%;background:linear-gradient(135deg,var(--purple-light),#ddd6fe);border:1px solid var(--border2);border-radius:var(--r);padding:14px;color:var(--purple);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s;box-shadow:var(--shadow);}
.feedback-btn:hover{background:linear-gradient(135deg,#ddd6fe,#c4b5fd);}
.feedback-btn:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;box-shadow:none;}
.feedback-card{margin-top:12px;background:var(--purple-light);border:1px solid var(--border2);border-radius:var(--r);padding:14px;}
.feedback-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);margin-bottom:8px;}
.feedback-text{font-size:13px;color:var(--text);line-height:1.7;font-style:italic;}
.share-btn{width:100%;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border:1px solid #a5d6a7;border-radius:var(--r);padding:14px;color:#2e7d32;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s;box-shadow:var(--shadow);margin-top:10px;}
.share-btn:hover{background:linear-gradient(135deg,#c8e6c9,#a5d6a7);}
.share-btn:disabled{background:var(--surface2);color:var(--text3);cursor:not-allowed;box-shadow:none;border-color:var(--border);}
.danger-btn{margin-top:14px;width:100%;background:none;border:1px solid var(--border);border-radius:var(--rs);padding:9px;color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .15s;}
.danger-btn:hover{border-color:var(--red);color:var(--red);}
.history-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);}
.history-day.today{border-color:var(--purple-mid);background:var(--purple-light);}
.hday-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.hday-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
.hday-date.today{color:var(--purple);}
.today-chip{font-family:'DM Mono',monospace;font-size:9px;color:var(--purple);background:#fff;padding:1px 6px;border-radius:8px;margin-left:6px;border:1px solid var(--border2);}
.hstats{display:flex;gap:14px;}
.hstat{text-align:right;}
.hstat-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;}
.hstat-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);}
.hbar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.hday-note{margin-top:7px;font-size:11px;color:var(--text3);font-style:italic;}
.hday-se{margin-top:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--red);background:var(--red-bg);padding:3px 8px;border-radius:8px;display:inline-block;}
.err-banner{background:var(--red-bg);border-bottom:1px solid #ffcdd2;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
.err-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);}
.err-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);letter-spacing:2px;}

/* Side Effects */
.se-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.se-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--purple);text-transform:uppercase;flex-shrink:0;}
.toggle-row{display:flex;gap:8px;}
.toggle-opt{font-family:'DM Mono',monospace;font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--surface);}
.toggle-opt.active-no{background:var(--green-bg);border-color:#a5d6a7;color:var(--green);}
.toggle-opt.active-yes{background:var(--red-bg);border-color:#ef9a9a;color:var(--red);}
.se-text{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:8px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;resize:none;outline:none;line-height:1.5;transition:border-color .2s;margin-top:8px;}
.se-text:focus{border-color:var(--red);}

/* Dose tab */
.dose-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);}
.dose-current{text-align:center;padding:20px 0 16px;}
.dose-big{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;color:var(--purple);line-height:1;}
.dose-unit{font-family:'DM Mono',monospace;font-size:16px;color:var(--text3);}
.dose-week{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);letter-spacing:2px;margin-top:4px;}
.dose-next{font-size:13px;color:var(--text2);margin-top:6px;}
.dose-progress{display:flex;justify-content:space-between;margin:16px 0 12px;}
.dose-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.dose-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);font-family:'DM Mono',monospace;font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .3s;}
.dose-dot.done{background:var(--purple);border-color:var(--purple);color:#fff;}
.dose-dot.current{background:#fff;border-color:var(--purple);color:var(--purple);box-shadow:0 0 0 3px rgba(124,77,255,.2);}
.dose-step-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);}
.dose-connector{flex:1;height:2px;background:var(--border2);margin-top:11px;align-self:flex-start;}
.dose-connector.done{background:var(--purple);}
.dose-actions{display:flex;gap:8px;margin-top:12px;}
.dose-advance{flex:1;background:var(--purple);border:none;border-radius:var(--rs);padding:12px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(124,77,255,.3);}
.dose-advance:disabled{background:var(--border2);color:var(--text3);box-shadow:none;cursor:not-allowed;}
.dose-revert{flex:1;background:none;border:1px solid var(--border2);border-radius:var(--rs);padding:12px;color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.dose-revert:disabled{color:var(--text3);border-color:var(--border);cursor:not-allowed;}
.dose-log-section{margin-top:14px;}
.dose-log-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.dose-log-item:last-child{border-bottom:none;}
.dlog-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
.dlog-dose{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--purple);}
.dlog-week{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.dose-log-btn{background:linear-gradient(135deg,var(--purple-light),#ddd6fe);border:1px solid var(--border2);border-radius:var(--r);padding:14px;color:var(--purple);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .2s;box-shadow:var(--shadow);width:100%;margin-top:12px;}
.dose-log-btn:hover{background:linear-gradient(135deg,#ddd6fe,#c4b5fd);}

/* Weight tab */
.weight-hero{text-align:center;padding:16px 0 20px;}
.weight-current{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;color:var(--text);line-height:1;}
.weight-unit{font-family:'DM Mono',monospace;font-size:16px;color:var(--text3);}
.weight-lost{font-family:'DM Mono',monospace;font-size:14px;color:var(--green);margin-top:8px;}
.weight-goals{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.wgoal{flex:1;min-width:80px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 8px;text-align:center;box-shadow:var(--shadow);}
.wgoal.reached{border-color:var(--green);background:var(--green-bg);}
.wgoal-val{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;}
.wgoal-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px;}

function keyMatches(lower, key) {
  if (!key) return false;
  if (key.length < 4) {
    var wbRegex = new RegExp('\\b' + key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
    return wbRegex.test(lower);
  }
  return lower.indexOf(key) >= 0;
}

  var allFoods = customAsBuiltin.concat(FOODS);
  var sorted = allFoods.slice().sort(function(a,b) {
    return Math.max.apply(null, b.keys.map(function(k){return k.length;})) - Math.max.apply(null, a.keys.map(function(k){return k.length;}));
  });
  for (var i = 0; i < sorted.length; i++) {
    var food = sorted[i];
    for (var j = 0; j < food.keys.length; j++) {
      var key = food.keys[j];
      if (!keyMatches(lower, key)) continue;
      if (usedLabels[food.label]) continue;
      if (food.group && usedGroups[food.group]) continue;
      if (food.group && blockedGroups[food.group]) continue;
      matched.push(food); usedLabels[food.label] = true;
      if (food.group) usedGroups[food.group] = true;
      if (food.blocks) { food.blocks.forEach(function(b){ blockedGroups[b] = true; }); }
      // If a custom food matched, block the generic groups that cover the same text
      if (food.custom) {
        food.keys.forEach(function(k) {
          if (!keyMatches(lower, k)) return;
          // Find any generic built-in foods whose key also matches the same region and block their group
          FOODS.forEach(function(bf) {
            if (!bf.generic) return;
            bf.keys.forEach(function(bk) {
              if (keyMatches(lower, bk) && bf.group) blockedGroups[bf.group] = true;
            });
          });
        });
      }
      break;
    }
  }
  // Post-filter: remove any generic matches that are fully covered by a custom food match
  var customMatched = matched.filter(function(f){ return f.custom; });
  if (customMatched.length > 0) {
    matched = matched.filter(function(f) {
      if (!f.generic || f.custom) return true;
      // Check if every region this generic key matches is also covered by a custom food key
      var genericMatchKey = f.keys.find(function(k){ return keyMatches(lower, k); });
      if (!genericMatchKey) return false;
      var covered = customMatched.some(function(cf) {
        return cf.keys.some(function(ck) {
          if (!keyMatches(lower, ck)) return false;
          // Both keys appear in the same part of the string - consider overlapping
          var gi = lower.indexOf(genericMatchKey);
          var ci = lower.indexOf(ck);
          return Math.abs(gi - ci) < Math.max(genericMatchKey.length, ck.length) + 8;
        });
      });
      return !covered;
    });
  }
  var tp = 0, tc = 0;
  matched.forEach(function(food) {
    var mult = 1;
    var matchKey = food.keys.find(function(k){ return keyMatches(lower, k); }) || food.keys[0];
    var idx = lower.indexOf(matchKey);
    var ctx = lower.slice(Math.max(0,idx-25), idx+25);
    if (/\btwo\b|2x/.test(ctx)) mult = 2;
    else if (/\bhalf\b/.test(ctx)) mult = 0.5;
    else if (/\bthree\b|3x/.test(ctx)) mult = 3;
    tp += Math.round(food.p * mult); tc += Math.round(food.c * mult);
  });

  var STOP_WORDS = ['and','with','a','an','the','of','on','some','my','for','plus','also','then','one','two','three','half','slice','slices','cup','cups','oz','tbsp','tsp','scoop','piece','pieces','small','large','medium'];

  // Split into chunks on common separators
  var rawChunks = text.split(/,|;|\band\b|\bwith\b|\bplus\b|\bthen\b/i).map(function(c){ return c.trim(); }).filter(Boolean);
  if (rawChunks.length === 0) rawChunks = [text];

  // Per-chunk: flag if unrecognized OR only covered by a generic match
  var unrecognizedChunks = [];
  rawChunks.forEach(function(chunk) {
    var chunkLower = chunk.toLowerCase();
    var coveringMatches = matched.filter(function(f) {
      return f.keys.some(function(k){ return keyMatches(chunkLower, k); });
    });
    var meaningful = chunk.trim().split(/\s+/).filter(function(w){
      return STOP_WORDS.indexOf(w.toLowerCase()) === -1 && !/^\d+$/.test(w);
    });
    if (meaningful.length === 0) return;
    var cleaned = chunk.trim().replace(/^(\d+\s*)?(slice|slices|cup|cups|oz|tbsp|tsp|scoop|piece|pieces|small|large|medium|one|two|three|half)\s+/i, '').trim();
    if (cleaned.length < 2) return;
    if (coveringMatches.length === 0) {
      unrecognizedChunks.push({ text: cleaned, reason: 'unrecognized' });
    } else if (coveringMatches.every(function(f){ return f.generic && !f.custom; }) && meaningful.length >= 2) {
      unrecognizedChunks.push({ text: cleaned, reason: 'generic' });
    }
  });
  // Single-chunk entry that only hit a generic — flag it too
  if (rawChunks.length === 1 && unrecognizedChunks.length === 0) {
    var allGenericSingle = matched.length > 0 && matched.every(function(f){ return f.generic && !f.custom; });
    if (allGenericSingle && text.trim().split(/\s+/).length >= 2) {
      var c0 = text.trim().replace(/^(\d+\s*)?(slice|slices|cup|cups|oz|tbsp|tsp|scoop|piece|pieces|small|large|medium|one|two|three|half)\s+/i, '').trim();
      unrecognizedChunks.push({ text: c0, reason: 'generic' });
    }
  }
  // Dedupe by text
  var seen = {};
  unrecognizedChunks = unrecognizedChunks.filter(function(c){
    if (seen[c.text]) return false; seen[c.text] = true; return true;
  });

  var allGeneric = matched.length > 0 && matched.every(function(f){ return f.generic && !f.custom; });
  var shouldSuggestAdd = matched.length === 0 || unrecognizedChunks.length > 0;

  var note = matched.length === 0 ? 'No items recognized — add them below so they match next time!'
    : tp >= 40 ? tp + 'g protein is a strong meal - exactly the Zepbound approach.'
    : tp >= 25 ? tp + 'g protein is solid. Protein-first is working.'
    : tp >= 15 ? tp + 'g here - aim to make up the gap at your next meal.'
    : 'Light protein here. Prioritize protein at your next meal or add a snack.';

  return {
    protein: tp, calories: tc,
    items: matched.length > 0 ? matched.map(function(f){return f.label;}) : [text],
    notes: note,
    recognized: matched.length > 0,
    allGeneric: allGeneric,
    shouldSuggestAdd: shouldSuggestAdd,
    unrecognizedChunks: unrecognizedChunks
  };
}

function pColor(pct) { return pct >= 80 ? '#43a047' : pct >= 50 ? '#f9a825' : '#e53935'; }
function wColor(pct) { return pct >= 80 ? '#1e88e5' : pct >= 50 ? '#42a5f5' : '#e53935'; }

// ─── STATE ────────────────────────────────────────────────────────────────────
var state = {
  meals:[], waterOz:0, dayNote:'', sideEffects:false, sideEffectsNote:'',
  activeTab:'log', history:[], loading:true, saveStatus:null, dbError:null,
  feedback:null, feedbackLoading:false, input:'', saveTimer:null, ready:false,
  mergeMode:false, mergeSelected:[], copyStatus:null,
  // dose
  currentDoseIndex:0, doseLog:[],
  // weight
  weights:[], weightInput:"", weightDateInput:todayISO(), weightChartRange:"all",
  // custom foods
  customFoods:[], foodForms:{}, editingFoodId:null,
  cfName:"", cfKeywords:"", cfServing:"", cfProtein:"", cfCalories:"",
};

function setState(updates) { Object.assign(state, updates); render(); }
function scheduleSave() {
  if (!state.ready) return;
  if (state.saveTimer) clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(doSave, 1000);
}
async function doSave() {
  setState({ saveStatus:'saving' });
  try {
    var tp = state.meals.reduce(function(s,m){return s+m.protein;},0);
    var tc = state.meals.reduce(function(s,m){return s+m.calories;},0);
    await sbUpsert({ date:todayISO(), meals:state.meals, water_oz:state.waterOz, day_note:state.dayNote, side_effects:state.sideEffects, side_effects_note:state.sideEffectsNote, total_protein:tp, total_calories:tc, updated_at:new Date().toISOString() });
    var hist = await sbHistory();
    setState({ saveStatus:'saved', history:hist||[] });
    setTimeout(function(){ setState({ saveStatus:null }); }, 2000);
  } catch(e) { setState({ saveStatus:'error', dbError:'Save failed: ' + e.message }); }
}
async function saveSettings() {
  try { await sbSaveSettings({ current_dose_index: state.currentDoseIndex }); } catch(e) {}
}

async function init() {
  try {
    var results = await Promise.all([sbGet(todayISO()), sbHistory(), sbGetSettings(), sbGetWeights(), sbGetDoseLog(), sbGetCustomFoods()]);
    var row=results[0], hist=results[1], settings=results[2], weights=results[3], doseLog=results[4], customFoods=results[5];
    if (row) {
      state.meals = row.meals || [];
      state.waterOz = row.water_oz || 0;
      state.dayNote = row.day_note || '';
      state.sideEffects = row.side_effects || false;
      state.sideEffectsNote = row.side_effects_note || '';
    }
    state.history = hist || [];
    state.weights = weights || [];
    state.doseLog = doseLog || [];
    state.customFoods = customFoods || [];
    if (settings && settings.current_dose_index != null) {
      state.currentDoseIndex = settings.current_dose_index;
    }
  } catch(e) { state.dbError = 'Could not load data: ' + e.message; }
  state.loading = false; state.ready = true; render();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function logMeal() {
  var txt = state.input.trim(); if (!txt) return;
  var est = estimateMeal(txt);
  state.meals = state.meals.concat([{ id:Date.now(), description:txt, items:est.items, protein:est.protein, calories:est.calories, notes:est.notes, recognized:est.recognized, allGeneric:est.allGeneric, shouldSuggestAdd:est.shouldSuggestAdd, unrecognizedChunks:est.unrecognizedChunks, time:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) }]);
  state.input = ''; state.feedback = null; scheduleSave(); render();
  setTimeout(function(){ var ta=document.getElementById('meal-input'); if(ta) ta.focus(); }, 50);
}
function deleteMeal(id) { state.meals = state.meals.filter(function(m){return m.id!==id;}); state.feedback=null; scheduleSave(); render(); }
function updateMealVal(id, field, val) {
  state.meals = state.meals.map(function(m){ return m.id===id ? Object.assign({},m,JSON.parse('{"'+field+'":'+( parseInt(val)||0)+'}')) : m; });
  scheduleSave(); render();
}
function addWater(oz) { state.waterOz = Math.min(state.waterOz+oz,120); scheduleSave(); render(); }

function toggleMergeMode() {
  state.mergeMode = !state.mergeMode;
  state.mergeSelected = [];
  render();
}
function toggleMergeSelect(id) {
  if (state.mergeSelected.indexOf(id) >= 0) {
    state.mergeSelected = state.mergeSelected.filter(function(x){ return x !== id; });
  } else {
    state.mergeSelected = state.mergeSelected.concat([id]);
  }
  render();
}
function confirmMerge() {
  if (state.mergeSelected.length < 2) return;
  var selected = state.meals.filter(function(m){ return state.mergeSelected.indexOf(m.id) >= 0; });
  var remaining = state.meals.filter(function(m){ return state.mergeSelected.indexOf(m.id) < 0; });
  var desc = selected.map(function(m){ return m.description; }).join(' + ');
  var items = [];
  selected.forEach(function(m){ m.items.forEach(function(it){ if (items.indexOf(it)<0) items.push(it); }); });
  var totalP = selected.reduce(function(s,m){ return s+m.protein; }, 0);
  var totalC = selected.reduce(function(s,m){ return s+m.calories; }, 0);
  var firstTime = selected[0].time;
  var merged = { id:Date.now(), description:desc, items:items, protein:totalP, calories:totalC, notes:totalP+'g combined protein from '+selected.length+' items merged.', recognized:true, time:firstTime, merged:true };
  // insert at position of first selected meal
  var firstIdx = state.meals.findIndex(function(m){ return m.id === state.mergeSelected[0]; });
  var newMeals = remaining.slice();
  newMeals.splice(firstIdx, 0, merged);
  state.meals = newMeals;
  state.mergeMode = false; state.mergeSelected = [];
  scheduleSave(); render();
}

function advanceDose() {
  if (state.currentDoseIndex >= DOSE_SEQUENCE.length - 1) return;
  state.currentDoseIndex++;
  saveSettings();
  var logEntry = { date: todayISO(), dose_mg: DOSE_SEQUENCE[state.currentDoseIndex], week: weeksSinceStart() };
  sbLogDose(logEntry).then(function(){
    return sbGetDoseLog();
  }).then(function(log){ state.doseLog = log || []; render(); }).catch(function(){});
  render();
}
function revertDose() {
  if (state.currentDoseIndex <= 0) return;
  state.currentDoseIndex--;
  saveSettings(); render();
}
function logDoseToday() {
  var logEntry = { date: todayISO(), dose_mg: DOSE_SEQUENCE[state.currentDoseIndex], week: weeksSinceStart() };
  sbLogDose(logEntry).then(function(){
    return sbGetDoseLog();
  }).then(function(log){ state.doseLog = log || []; render(); }).catch(function(){});
}

function logWeight() {
  var val = parseFloat(state.weightInput);
  if (!val || val < 50 || val > 600) return;
  var date = state.weightDateInput || todayISO();
  sbUpsertWeight({ date: date, weight_lbs: val }).then(function(){
    return sbGetWeights();
  }).then(function(w){ state.weights = w || []; state.weightInput = ''; render(); }).catch(function(e){ state.dbError = 'Weight save failed: ' + e.message; render(); });
}
function deleteWeight(date) {
  sbDeleteWeight(date).then(function(){
    return sbGetWeights();
  }).then(function(w){ state.weights = w || []; render(); }).catch(function(){});
}

function generateFeedback() {
  setState({ feedbackLoading:true });
  setTimeout(function() {
    var tp=state.meals.reduce(function(s,m){return s+m.protein;},0);
    var tw=state.waterOz;
    var pp=(tp/PROTEIN_GOAL)*100, wp=(tw/WATER_GOAL)*100;
    var fb = pp>=95?'Outstanding - '+tp+'g protein hits the goal. ':pp>=75?'Good day at '+tp+'g protein, '+(PROTEIN_GOAL-tp)+'g short of goal. ':pp>=50?tp+'g protein is a start - push harder at remaining meals. ':'Only '+tp+'g protein - lean on Greek yogurt, cottage cheese, or a Fairlife shake. ';
    fb += wp>=90?'Hydration excellent at '+tw+'oz. ':wp>=60?'Water at '+tw+'oz - keep sipping toward '+WATER_GOAL+'oz. ':'Water low at '+tw+'oz - dehydration worsens Zepbound side effects. ';
    fb += state.meals.length>=3?state.meals.length+' meals shows solid eating structure.':state.meals.length===2?'Only 2 meals - consider a snack if your appetite allows.':'Light logging today - make sure you are eating enough even when not hungry.';
    if (state.sideEffects && state.sideEffectsNote) fb += ' Side effects noted: "'+state.sideEffectsNote+'"';
    if (state.dayNote) fb += ' Note: "'+state.dayNote+'"';
    setState({ feedback:fb, feedbackLoading:false });
  }, 400);
}
function buildShareMsg() {
  var tp=state.meals.reduce(function(s,m){return s+m.protein;},0);
  var tc=state.meals.reduce(function(s,m){return s+m.calories;},0);
  var date=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var mealLines=state.meals.map(function(m,i){ return '  Meal '+(i+1)+' ('+m.time+'): '+m.description+' - '+m.protein+'g protein, '+m.calories+' cal'; }).join('\n');
  var latestWeight = state.weights.length > 0 ? state.weights[state.weights.length-1].weight_lbs : null;
  return 'Here is my Zepbound daily summary for '+date+':\n\n'
    +'CURRENT DOSE: '+DOSE_SEQUENCE[state.currentDoseIndex]+'mg (Week '+weeksSinceStart()+')\n'
    +(latestWeight?'CURRENT WEIGHT: '+latestWeight+' lbs (started at '+STARTING_WEIGHT+' lbs, lost '+(STARTING_WEIGHT-latestWeight).toFixed(1)+' lbs)\n\n':'')
    +'MEALS LOGGED ('+state.meals.length+'):\n'+(mealLines||'  No meals logged')+'\n\n'
    +'TOTALS:\n  Protein: '+tp+'g / 140g goal\n  Calories: '+tc+'\n  Water: '+state.waterOz+'oz / 80oz goal\n'
    +(state.sideEffects?'\nSIDE EFFECTS: '+state.sideEffectsNote+'\n':'')
    +(state.dayNote?'\nDAY NOTES: '+state.dayNote+'\n':'')
    +'\nPlease give me feedback on today, protein targets, and what to focus on tomorrow.';
}
function shareToClaude() {
  var msg = buildShareMsg();
  // Try claude:// deep link first (opens mobile app), fall back to web
  window.location.href = 'claude://?q=' + encodeURIComponent(msg);
  // Fall back to web after short delay if app didn't open
  setTimeout(function() {
    window.open('https://claude.ai/new?q='+encodeURIComponent(msg), '_blank');
  }, 1000);
}
function copyToClipboard() {
  var msg = buildShareMsg();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(function() {
      setState({ copyStatus: 'copied' });
      setTimeout(function(){ setState({ copyStatus: null }); }, 2000);
    }).catch(function() { fallbackCopy(msg); });
  } else {
    fallbackCopy(msg);
  }
}
function fallbackCopy(msg) {
  var ta = document.createElement('textarea');
  ta.value = msg; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); setState({ copyStatus: 'copied' }); setTimeout(function(){ setState({ copyStatus: null }); }, 2000); }
  catch(e) { setState({ copyStatus: 'error' }); }
  document.body.removeChild(ta);
}

// ─── CHART RENDERING ─────────────────────────────────────────────────────────
function buildWeightChart(weights, range) {
  if (!weights || weights.length === 0) return '<div style="text-align:center;padding:40px;color:var(--text3);font-family:DM Mono,monospace;font-size:11px;">No weight data yet</div>';
  var filtered = weights.slice();
  if (range === '8w') { var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-56); filtered = weights.filter(function(w){ return new Date(w.date+'T12:00:00') >= cutoff; }); }
  else if (range === '4w') { var cutoff2 = new Date(); cutoff2.setDate(cutoff2.getDate()-28); filtered = weights.filter(function(w){ return new Date(w.date+'T12:00:00') >= cutoff2; }); }
  if (filtered.length === 0) filtered = weights.slice(-5);
  var allPoints = filtered;
  var vals = allPoints.map(function(w){ return w.weight_lbs; });
  var goalVals = WEIGHT_GOALS.map(function(g){ return g.val; });
  var minW = Math.min.apply(null, vals.concat(goalVals)) - 5;
  var maxW = Math.max.apply(null, vals.concat([STARTING_WEIGHT])) + 5;
  var W = 460, H = 160, padL = 40, padR = 10, padT = 10, padB = 28;
  var cW = W - padL - padR, cH = H - padT - padB;
  function xPos(i) { return padL + (allPoints.length < 2 ? cW/2 : i / (allPoints.length-1) * cW); }
  function yPos(v) { return padT + cH - ((v - minW) / (maxW - minW)) * cH; }
  // build path
  var pathD = allPoints.map(function(p,i){ return (i===0?'M':'L')+xPos(i)+','+yPos(p.weight_lbs); }).join(' ');
  var areaD = pathD + ' L'+xPos(allPoints.length-1)+','+(padT+cH)+' L'+padL+','+(padT+cH)+' Z';
  // goal lines
  var goalLines = WEIGHT_GOALS.map(function(g) {
    if (g.val < minW || g.val > maxW) return '';
    var y = yPos(g.val);
    var reached = vals[vals.length-1] <= g.val;
    var color = reached ? '#43a047' : '#b39ddb';
    return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="'+color+'" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>'
      +'<text x="'+(W-padR-2)+'" y="'+(y-3)+'" text-anchor="end" font-family="DM Mono,monospace" font-size="8" fill="'+color+'">'+g.val+'</text>';
  }).join('');
  // y-axis labels
  var yLabels = '';
  for (var v = Math.ceil(minW/10)*10; v <= maxW; v+=10) {
    var y = yPos(v);
    yLabels += '<text x="'+(padL-4)+'" y="'+(y+3)+'" text-anchor="end" font-family="DM Mono,monospace" font-size="8" fill="#9e8ec4">'+v+'</text>';
  }
  // dots
  var dots = allPoints.map(function(p,i){
    var cx=xPos(i), cy=yPos(p.weight_lbs);
    return '<circle cx="'+cx+'" cy="'+cy+'" r="3.5" fill="#7c4dff" stroke="#fff" stroke-width="1.5"/>';
  }).join('');
  // x labels (show first, last, and evenly spaced)
  var xLabels = '';
  var showEvery = Math.max(1, Math.floor(allPoints.length / 4));
  allPoints.forEach(function(p,i){
    if (i===0 || i===allPoints.length-1 || i%showEvery===0) {
      var d = new Date(p.date+'T12:00:00');
      var label = (d.getMonth()+1)+'/'+(d.getDate());
      xLabels += '<text x="'+xPos(i)+'" y="'+(H-4)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="8" fill="#9e8ec4">'+label+'</text>';
    }
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">'
    +'<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c4dff" stop-opacity="0.2"/><stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/></linearGradient></defs>'
    +'<path d="'+areaD+'" fill="url(#wg)"/>'
    +goalLines + yLabels + xLabels
    +'<path d="'+pathD+'" fill="none" stroke="#7c4dff" stroke-width="2" stroke-linejoin="round"/>'
    +dots
    +'</svg>';
}

// ─── BADGE LOGIC ─────────────────────────────────────────────────────────────
function buildBadgeText() {
  var weeks = weeksSinceStart();
  var dose = DOSE_SEQUENCE[state.currentDoseIndex];
  var isDoseDay = isTuesday();
  return (isDoseDay ? '💉 DOSE DAY · ' : '') + 'WEEK ' + weeks + ' · ' + dose + 'mg';
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function escJs(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  var app = document.getElementById('app'); if (!app) return;
  if (state.loading) { app.innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-text">LOADING YOUR DATA...</div></div>'; return; }

  var tp=state.meals.reduce(function(s,m){return s+m.protein;},0);
  var tc=state.meals.reduce(function(s,m){return s+m.calories;},0);
  var protPct=Math.min((tp/PROTEIN_GOAL)*100,100), watPct=Math.min((state.waterOz/WATER_GOAL)*100,100);
  var pc=pColor(protPct), wc=wColor(watPct);
  var protRem=Math.max(PROTEIN_GOAL-tp,0), watRem=Math.max(WATER_GOAL-state.waterOz,0);
  var today=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var isDoseDay = isTuesday();

  var syncEl='';
  if (state.saveStatus==='saved') syncEl='<span class="sync sync-ok">SYNCED</span>';
  else if (state.saveStatus==='saving') syncEl='<span class="sync sync-ing">SAVING...</span>';
  else if (state.saveStatus==='error') syncEl='<span class="sync sync-err">SYNC ERROR</span>';

  var errEl='';
  if (state.dbError) errEl='<div class="err-banner"><span class="err-text">! '+state.dbError+'</span><button class="err-close" onclick="clearErr()">✕</button></div>';

  var tabContent='';

  // ── LOG TAB ────────────────────────────────────────────────────────────────
  if (state.activeTab==='log') {
    var mealCards='';
    if (state.meals.length===0) {
      mealCards='<div class="empty"><div class="empty-icon">🥗</div><div class="empty-text">No meals logged yet today.</div><div class="empty-sub">Syncs across all your devices automatically</div></div>';
    } else {
      var mergeBar='';
      if (state.mergeMode) {
        var count = state.mergeSelected.length;
        mergeBar='<div class="merge-bar">'

          +'<div class="hstat"><div class="hstat-val" style="color:'+dpc+'">'+(day.total_protein||0)+'g</div><div class="hstat-label">PROTEIN</div></div>'
          +'<div class="hstat"><div class="hstat-val" style="color:#6b5b9a">'+(day.total_calories||0)+'</div><div class="hstat-label">CAL</div></div>'
          +'<div class="hstat"><div class="hstat-val" style="color:'+dwc+'">'+(day.water_oz||0)+'oz</div><div class="hstat-label">WATER</div></div>'
          +'</div></div>'
          +'<div class="hbar"><div class="hbar-fill" style="width:'+pp+'%;background:'+dpc+'"></div></div>'
          +(day.side_effects && day.side_effects_note?'<div class="hday-se">⚠ '+day.side_effects_note+'</div>':'')
          +(day.day_note?'<div class="hday-note">"'+day.day_note+'"</div>':'')
          +'</div>';
      });
    }
    tabContent='<div style="margin-top:18px"><div class="card-label">Past 30 Days</div>'+histItems+'</div>';
  }

  // ── SETTINGS TAB ─────────────────────────────────────────────────────────
  else if (state.activeTab==='settings') {
    var cfListHtml='';
    if (state.customFoods.length===0) {
      cfListHtml='<div class="empty" style="padding:32px 20px"><div class="empty-icon">🥄</div><div class="empty-text">No custom foods yet.</div><div class="empty-sub">When a meal is unrecognized, tap "Add Food" on the meal card.</div></div>';
    } else {
      cfListHtml = state.customFoods.map(function(cf) {
        return '<div class="custom-food-item">'
          +'<div class="cf-info">'
          +'<div class="cf-name">'+cf.name+'</div>'
          +(cf.keywords?'<div class="cf-keywords">Keywords: '+cf.keywords+'</div>':'')
          +(cf.serving_note?'<div class="cf-serving">Serving: '+cf.serving_note+'</div>':'')
          +'<div class="cf-macros"><span class="cf-macro">'+cf.protein_g+'g protein</span><span class="cf-macro">'+cf.calories+' cal</span></div>'
          +'</div>'
          +'<div class="cf-actions">'
          +'<button class="cf-edit-btn" onclick="editCustomFood('+cf.id+')">Edit</button>'
          +'<button class="cf-del-btn" onclick="deleteCustomFood('+cf.id+')">✕</button>'
          +'</div></div>';
      }).join('');
    }
    // show edit form if editing from settings tab
    var settingsFormHtml = (state.addFoodMealId==='settings') ?
      '<div class="add-food-form" style="margin-bottom:14px">'
      +'<div class="add-food-form-title">'+(state.editingFoodId?'EDIT FOOD':'ADD NEW FOOD')+'</div>'
      +'<div class="food-field"><label class="food-field-label">FOOD NAME</label><input type="text" value="'+state.cfName+'" placeholder="e.g. Farmhouse Butter Bread" oninput="setCF(\'cfName\',this.value)"></div>'
      +'<div class="food-field"><label class="food-field-label">KEYWORDS (comma separated)</label><input type="text" value="'+state.cfKeywords+'" placeholder="farmhouse bread, butter bread" oninput="setCF(\'cfKeywords\',this.value)"></div>'
      +'<div class="food-field"><label class="food-field-label">SERVING SIZE NOTE</label><input type="text" value="'+state.cfServing+'" placeholder="1 slice (38g)" oninput="setCF(\'cfServing\',this.value)"></div>'
      +'<div class="food-field-row">'
      +'<div class="food-field"><label class="food-field-label">PROTEIN (g)</label><input type="number" value="'+state.cfProtein+'" placeholder="4" oninput="setCF(\'cfProtein\',this.value)"></div>'
      +'<div class="food-field"><label class="food-field-label">CALORIES</label><input type="number" value="'+state.cfCalories+'" placeholder="110" oninput="setCF(\'cfCalories\',this.value)"></div>'
      +'</div>'
      +'<div class="food-form-actions">'
      +'<button class="food-save-btn" onclick="saveCustomFood()">'+(state.editingFoodId?'UPDATE FOOD':'SAVE FOOD')+'</button>'
      +'<button class="food-cancel-btn" onclick="cancelAddFood()">CANCEL</button>'
      +'</div></div>'
      : '<button class="dose-log-btn" style="margin-bottom:14px" onclick="openNewFoodForm()">+ Add New Food Manually</button>';
    tabContent='<div style="margin-top:18px">'
      +settingsFormHtml
      +'<div class="card"><div class="card-label">My Custom Foods ('+state.customFoods.length+')</div>'
      +cfListHtml
      +'</div></div>';
  }

  var badgeText = buildBadgeText();
  app.innerHTML=errEl
    +'<div class="header"><div class="header-inner">'
    +'<div class="header-top"><div>'
    +'<div class="badge'+(isDoseDay?' dose-day':'')+'">'+badgeText+'</div>'
    +'<div class="header-title">Daily Tracker <span style="font-size:11px;font-family:DM Mono,monospace;color:var(--text3);font-weight:400;">v1.6.1</span></div>'
    +'<div class="header-sub"><span class="header-date">'+today+'</span>'+syncEl+'</div>'
    +'</div>'
    +'<div class="protein-display"><div class="protein-big" style="color:'+pc+'">'+tp+'g</div><div class="protein-label">PROTEIN</div></div>'
    +'</div>'
    +'<div class="progress-bars">'
    +'<div><div class="progress-labels"><span class="pleft">Protein '+tp+'/'+PROTEIN_GOAL+'g</span><span class="pright" style="color:'+pc+'">'+(protRem>0?protRem+'g to go':'Goal reached ✓')+'</span></div><div class="progress-track"><div class="progress-fill" style="width:'+protPct+'%;background:linear-gradient(90deg,'+pc+'88,'+pc+')"></div></div></div>'
    +'<div><div class="progress-labels"><span class="pleft">Water '+state.waterOz+'/'+WATER_GOAL+'oz</span><span class="pright" style="color:'+wc+'">'+(watRem>0?watRem+'oz to go':'Goal reached ✓')+'</span></div><div class="progress-track"><div class="progress-fill" style="width:'+watPct+'%;background:linear-gradient(90deg,'+wc+'88,'+wc+')"></div></div></div>'
    +'</div></div></div>'
    +'<div class="tabs">'
    +['log','water','summary','dose','weight','history','settings'].map(function(t){return '<button class="tab'+(state.activeTab===t?' active':'')+'" onclick="setTab(\''+t+'\')">'+t+'</button>';}).join('')
    +'</div>'
    +'<div class="main">'+tabContent+'</div>';

  var ta=document.getElementById('meal-input');
  if (ta) {
    ta.value=state.input;
    ta.addEventListener('input',function(e){ state.input=e.target.value; var btn=document.getElementById('log-btn'); if(btn) btn.disabled=!e.target.value.trim(); });
    var btn=document.getElementById('log-btn'); if(btn) btn.disabled=!state.input.trim();
  }
}

// ─── GLOBALS ─────────────────────────────────────────────────────────────────
window.handleKey=function(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();logMeal();} };
window.setTab=function(t){ setState({activeTab:t}); };
window.delMeal=deleteMeal;
window.updMeal=updateMealVal;
window.addWater=addWater;
window.resetWater=function(){ state.waterOz=0; scheduleSave(); render(); };
window.updateNote=function(v){ state.dayNote=v; scheduleSave(); };
window.setSE=function(v){ state.sideEffects=v; if(!v) state.sideEffectsNote=''; scheduleSave(); render(); };
window.setSENote=function(v){ state.sideEffectsNote=v; scheduleSave(); };
window.generateFeedback=generateFeedback;
window.clearErr=function(){ setState({dbError:null}); };
window.shareToClaude=shareToClaude;
window.copyToClipboard=copyToClipboard;
window.logMeal=logMeal;
window.toggleMergeMode=toggleMergeMode;
window.toggleMergeSelect=toggleMergeSelect;
window.confirmMerge=confirmMerge;
window.advanceDose=advanceDose;
window.revertDose=revertDose;
window.logDoseToday=logDoseToday;
window.logWeight=logWeight;
window.deleteWeight=deleteWeight;
window.setWeightInput=function(v){ state.weightInput=v; };
window.setWeightDate=function(v){ state.weightDateInput=v; };
window.setChartRange=function(r){ state.weightChartRange=r; render(); };
window.resetDay=function(){
  if(confirm('Reset today\'s log? This cannot be undone.')){
    state.meals=[]; state.waterOz=0; state.feedback=null; state.dayNote=''; state.sideEffects=false; state.sideEffectsNote='';
    scheduleSave(); render();
  }
};
// ─── CUSTOM FOOD GLOBALS ─────────────────────────────────────────────────────
window.openChunkForm=function(mealId, chunkIdx, chunkText) {
  if (!state.foodForms[mealId]) state.foodForms[mealId] = {};
  state.foodForms[mealId][chunkIdx] = { open:true, name:chunkText||'', keywords:chunkText?chunkText.toLowerCase():'', serving:'', protein:'', calories:'' };
  render();
};
window.closeChunkForm=function(mealId, chunkIdx) {
  if (state.foodForms[mealId]) delete state.foodForms[mealId][chunkIdx];
  render();
};
window.setCFF=function(mealId, chunkIdx, field, val) {
  if (!state.foodForms[mealId]) state.foodForms[mealId] = {};
  if (!state.foodForms[mealId][chunkIdx]) state.foodForms[mealId][chunkIdx] = { open:true };
  state.foodForms[mealId][chunkIdx][field] = val;
};
window.saveChunkFood=function(mealId, chunkIdx) {
  var form = (state.foodForms[mealId]||{})[chunkIdx];
  if (!form) return;
  var p=parseInt(form.protein)||0, c=parseInt(form.calories)||0;
  var name=(form.name||'').trim();
  if (!name || (!p && !c)) { alert('Please enter a name and at least one of protein or calories.'); return; }
  var data = { name:name, keywords:(form.keywords||'').trim(), serving_note:(form.serving||'').trim(), protein_g:p, calories:c };
  sbSaveCustomFood(data).then(function(){ return sbGetCustomFoods(); })
  .then(function(foods) {
    state.customFoods = foods || [];
    if (state.foodForms[mealId]) delete state.foodForms[mealId][chunkIdx];
    // Re-estimate the meal now that the custom food is in state
    state.meals = state.meals.map(function(m) {
      if (m.id !== mealId) return m;
      var est = estimateMeal(m.description);
      return Object.assign({}, m, {
        protein: est.protein, calories: est.calories,
        items: est.items, notes: est.notes,
        recognized: est.recognized, allGeneric: est.allGeneric,
        shouldSuggestAdd: est.shouldSuggestAdd,
        unrecognizedChunks: est.unrecognizedChunks
      });
    });
    scheduleSave();
    render();
  }).catch(function(e){ state.dbError='Save food failed: '+e.message; render(); });
};
window.setCF=function(field, val) { state[field]=val; };
window.cancelAddFood=function() {
  state.foodForms={}; state.editingFoodId=null;
  state.cfName=''; state.cfKeywords=''; state.cfServing=''; state.cfProtein=''; state.cfCalories='';
  render();
};
window.saveCustomFood=function() {
  var p=parseInt(state.cfProtein)||0, c=parseInt(state.cfCalories)||0;
  if (!state.cfName.trim() || (!p && !c)) return;
  var data = { name:state.cfName.trim(), keywords:state.cfKeywords.trim(), serving_note:state.cfServing.trim(), protein_g:p, calories:c };
  if (state.editingFoodId) data.id = state.editingFoodId;
  sbSaveCustomFood(data).then(function(){ return sbGetCustomFoods(); })
  .then(function(foods) {
    state.customFoods = foods || [];
    state.foodForms={}; state.editingFoodId=null;
    state.cfName=''; state.cfKeywords=''; state.cfServing=''; state.cfProtein=''; state.cfCalories='';
    // Re-estimate all meals so any that match the updated food get refreshed
    state.meals = state.meals.map(function(m) {
      var est = estimateMeal(m.description);
      return Object.assign({}, m, {
        protein: est.protein, calories: est.calories,
        items: est.items, notes: est.notes,
        recognized: est.recognized, allGeneric: est.allGeneric,
        shouldSuggestAdd: est.shouldSuggestAdd,
        unrecognizedChunks: est.unrecognizedChunks
      });
    });
    scheduleSave();
    render();
  }).catch(function(e){ state.dbError='Save food failed: '+e.message; render(); });
};
window.editCustomFood=function(id) {
  var cf = state.customFoods.find(function(f){ return f.id===id; });
  if (!cf) return;
  state.editingFoodId = id;
  state.addFoodMealId = 'settings';
  state.cfName = cf.name;
  state.cfKeywords = cf.keywords||'';
  state.cfServing = cf.serving_note||'';
  state.cfProtein = String(cf.protein_g);
  state.cfCalories = String(cf.calories);
  setState({activeTab:'settings'});
};
window.openNewFoodForm=function() {
  state.editingFoodId=null; state.addFoodMealId='settings';
  state.cfName=''; state.cfKeywords=''; state.cfServing=''; state.cfProtein=''; state.cfCalories='';
  render();
};
window.deleteCustomFood=function(id) {
  if (!confirm('Delete this custom food?')) return;
  sbDeleteCustomFood(id).then(function(){
    return sbGetCustomFoods();
  }).then(function(foods){ state.customFoods=foods||[]; render(); }).catch(function(e){ state.dbError='Delete failed: '+e.message; render(); });
};

window.onerror=function(msg,src,line,col,err){
  document.getElementById('app').innerHTML='<div style="padding:20px;font-family:monospace;color:#c00;background:#fff0f0;margin:20px;border-radius:8px;border:1px solid #fcc"><b>Error</b><br>'+msg+'<br>Line: '+line+'</div>';
};

init();
</script>
</body>
</html>
